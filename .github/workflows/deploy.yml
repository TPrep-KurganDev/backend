name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or latest)"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo -e "Host server\n  HostName ${{ secrets.SSH_HOST }}\n  User ${{ secrets.SSH_USER }}\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy and health check
        run: |
          ssh server '
            cd deploy
            sed -i "s/^BACKEND_VERSION=.*/BACKEND_VERSION=${{ inputs.tag }}/" .env
            docker compose pull backend
            docker compose up -d backend
            sleep 5
            curl -f http://localhost:8000/api/health || { echo "Health check failed!"; exit 1; }
          '